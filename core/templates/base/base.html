{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}GSF Hub{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'core/css/home.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/gsf-ui.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/gsf-layout.css' %}">

  {% block extra_css %}{% endblock %}
</head>

<body>

  <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

  <div class="gsf-shell">

    {% include "partials/sidebar.html" %}

    <div class="gsf-main">

      {% include "partials/header.html" %}

      <main class="gsf-content">
        {% block content %}{% endblock %}
      </main>

      {% include "partials/footer.html" %}

    </div>
  </div>

  <script src="{% static 'core/js/home.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
