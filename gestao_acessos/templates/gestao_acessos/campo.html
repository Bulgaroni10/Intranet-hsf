<div class="form-group">
  <label for="{{ campo.id_for_label }}">{{ campo.label }}{% if campo.field.required %} *{% endif %}</label>
  {{ campo }}
  {% if campo.help_text %}<small>{{ campo.help_text }}</small>{% endif %}
  {% for erro in campo.errors %}<small class="field-error">{{ erro }}</small>{% endfor %}
</div>
